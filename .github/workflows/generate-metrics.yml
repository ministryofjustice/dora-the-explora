name: DORA Metrics Workflow

on:
  workflow_dispatch:
    inputs:
      date_range:
        description: "Date range for metrics (format: YYYY-MM-DD..YYYY-MM-DD)"
        required: false
      json_file_path:
        description: "Path to the JSON file with repository names"
        required: false
  push:
    branches:
      - feature/github-app-auth
  schedule:
    - cron: "0 8 * * 0" # At 08:00 on Sunday

concurrency:
  group: generate-metrics
  cancel-in-progress: false

permissions: {}

jobs:
  run_metrics:
    permissions:
      issues: write
      contents: write
      pull-requests: read
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5.6.0

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Get current end_date
        if: github.event.inputs.date_range == ''
        run: echo "end_date=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV

      - name: Calculate start_date (7 days ago)
        if: github.event.inputs.date_range == ''
        run: |
          echo "start_date=$(date -u +%Y-%m-%d --date='7 days ago')" >> $GITHUB_ENV

      - name: Parse date_range input
        if: github.event.inputs.date_range != ''
        run: |
          start_date=$(echo "${{ github.event.inputs.date_range }}" | cut -d. -f1)
          end_date=$(echo "${{ github.event.inputs.date_range }}" | rev | cut -d. -f1 | rev)
          echo "start_date=$start_date" >> $GITHUB_ENV
          echo "end_date=$end_date" >> $GITHUB_ENV

      - name: Create GitHub App token
        id: app
        uses: actions/create-github-app-token@67018539274d69449ef7c02e8e71183d1719ab42 # v2.1.4
        with:
          app-id: ${{ secrets.MP_APP_ID }}
          private-key: ${{ secrets.MP_GITHUB_APP_PRIVATE_KEY }}
          owner: "ministryofjustice"
          repositories: "modernisation-platform,modernisation-platform-ami-builds,modernisation-platform-cp-network-test,modernisation-platform-github-oidc-provider,modernisation-platform-github-oidc-role,modernisation-platform-instance-scheduler,modernisation-platform-terraform-aws-vm-import,modernisation-platform-terraform-baselines,modernisation-platform-terraform-bastion-linux,modernisation-platform-terraform-cross-account-access,modernisation-platform-terraform-dns-certificates,modernisation-platform-terraform-ec2-autoscaling-group,modernisation-platform-terraform-ec2-instance,modernisation-platform-terraform-ecs-cluster,modernisation-platform-terraform-environments,modernisation-platform-terraform-iam-superadmins,modernisation-platform-terraform-lambda-function,modernisation-platform-terraform-loadbalancer,modernisation-platform-terraform-member-vpc,modernisation-platform-terraform-pagerduty-integration,modernisation-platform-terraform-s3-bucket,modernisation-platform-terraform-s3-bucket-replication-role,modernisation-platform-terraform-ssm-patching"

      - name: Run scripts and create issues
        env:
          ACCESS_TOKEN: ${{ steps.app.outputs.token }}
          GH_TOKEN: ${{ steps.app.outputs.token }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          JSON_FILE_PATH: ${{ github.event.inputs.json_file_path }}
          START_DATE: ${{ env.start_date }}
          END_DATE: ${{ env.end_date }}
          GITHUB_ACTIONS: ${{ env.GITHUB_ACTIONS }}
        run: |
          # Determine list of JSON files to process
          if [ -n "$JSON_FILE_PATH" ]; then
            json_files=("$JSON_FILE_PATH")
          else
            json_files=(*.json)
          fi

          for json_file in "${json_files[@]}"; do
            name=$(basename "$json_file" .json)
            issue_title="📊 DORA Metrics for $START_DATE..$END_DATE for $name"
            issue_body=""

            for script in cfr.py df.py ltfc.py mttr.py; do
              python "$script" "$json_file" "$START_DATE..$END_DATE"
              output=$(cat output.log)
              rm output.log
              metric=$(basename "$script" .py | tr '[:lower:]' '[:upper:]')
              issue_body+="$output"
            done

            if [ "$GITHUB_ACTIONS" == "true" ]; then
              gh issue create --title "$issue_title" --body "$issue_body"
            else
              echo "Skipping issue creation because running outside GitHub Actions."
            fi
          done
